services:
  postgres:
    image: postgres:16-alpine
    container_name: pg-mvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pg
      POSTGRES_PASSWORD: pg
      POSTGRES_DB: pg_mvp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pg -d pg_mvp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
